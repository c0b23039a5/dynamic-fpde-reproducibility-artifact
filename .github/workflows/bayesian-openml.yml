  aggregate:
    name: Aggregate Bayesian OpenML results
    runs-on: ubuntu-latest
    needs:
      - task-seed-0
      - task-seed-1
      - task-seed-2
      - task-seed-3
    if: always()

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install aggregation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy pyarrow pyyaml matplotlib scikit-learn

      - name: Download task seed artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bayesian-openml-task-*-seed-*
          path: bayesian_artifacts
          merge-multiple: true

      - name: Combine task seed outputs
        run: |
          python - <<'PY'
          from experiments.aggregate_results import combine_openml_task_outputs

          combine_openml_task_outputs("bayesian_artifacts", "results")
          PY

      - name: Aggregate statistics
        run: |
          python -m experiments.aggregate_results --results-dir results --figures-dir figures

      - name: Upload aggregate summary
        uses: actions/upload-artifact@v7
        with:
          name: bayesian-openml-aggregate
          path: |
            results/
            figures/
          retention-days: 30
