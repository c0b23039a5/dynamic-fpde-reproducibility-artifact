name: Artifact check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install table-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy scipy tabulate jinja2

      - name: Rebuild tables from precomputed outputs
        run: |
          mkdir -p "$RUNNER_TEMP/generated"
          python scripts/build_reproducibility_tables.py \
            --input results_precomputed \
            --output "$RUNNER_TEMP/generated" \
            --expected-tasks 72 \
            --expected-seeds 10
