name: IEEE Access Bayesian-FPDE experiments

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "IEEE Access experiment mode to run"
        required: true
        default: ieee_min
        type: choice
        options:
          - ieee_min
          - ieee_full
      install_baselines:
        description: "Install optional SHAP/LIME baselines"
        required: true
        default: false
        type: boolean
      run_tests:
        description: "Run tests before experiments"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ieee-access-bayesian-fpde-${{ github.ref }}-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  ieee-access-experiments:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Bayesian-FPDE pipeline
        run: |
          python -m pip install --upgrade pip
          if [ "${{ inputs.install_baselines }}" = "true" ]; then
            python -m pip install -e ".[dev,openml,baselines]"
          else
            python -m pip install -e ".[dev,openml]"
          fi

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: |
          python -m pytest

      - name: Create IEEE Access output directories
        run: |
          mkdir -p results_ieee figures_ieee logs_ieee

      - name: Run IEEE Access public-data experiments
        run: |
          echo "Running IEEE Access public-data experiments with mode=${{ inputs.mode }}"
          python -m experiments.run_public_uncertainty_validation --config configs/openml_public_ieee_access.yaml --mode "${{ inputs.mode }}"
          python -m experiments.run_stability --config configs/openml_public_ieee_access.yaml --mode "${{ inputs.mode }}"
          python -m experiments.run_faithfulness --config configs/openml_public_ieee_access.yaml --mode "${{ inputs.mode }}"
          python -m experiments.run_training_size_uncertainty --config configs/openml_public_ieee_access.yaml --mode "${{ inputs.mode }}"
          python -m experiments.aggregate_results --results-dir results_ieee --figures-dir figures_ieee --logs-dir logs_ieee

      - name: Upload IEEE Access experiment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bayesian-fpde-ieee-access-${{ inputs.mode }}
          path: |
            results_ieee/
            figures_ieee/
            logs_ieee/
            configs/openml_public_ieee_access.yaml
          if-no-files-found: warn
          retention-days: 14
