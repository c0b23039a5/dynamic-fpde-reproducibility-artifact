name: Synthetic calibration

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Synthetic calibration mode"
        required: true
        default: "pilot"
        type: choice
        options:
          - smoke
          - pilot
          - full
      seeds:
        description: "Seeds as JSON array or comma-separated list; leave empty to use config mode"
        required: false
        default: ""
      posterior_samples:
        description: "Override posterior samples; leave empty to use config mode"
        required: false
        default: ""
      n_explain:
        description: "Override explained instances per condition; leave empty to use config mode"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  prepare-matrix:
    name: Prepare synthetic matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      experiment_config_hash: ${{ steps.matrix.outputs.experiment_config_hash }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install config dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: Build matrix
        id: matrix
        env:
          MODE: ${{ inputs.mode }}
          SEEDS_INPUT: ${{ inputs.seeds }}
          POSTERIOR_SAMPLES_INPUT: ${{ inputs.posterior_samples }}
          N_EXPLAIN_INPUT: ${{ inputs.n_explain }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          import yaml

          def parse_values(text, default, cast=int):
              text = (text or "").strip()
              if not text:
                  return list(default)
              if text.startswith("["):
                  return [cast(v) for v in json.loads(text)]
              return [cast(part.strip()) for part in text.split(",") if part.strip()]

          def group_samples(values, mode):
              values = [int(v) for v in values]
              if mode == "full":
                  return [values[:2], values[2:]]
              return [values]

          cfg = yaml.safe_load(Path("configs/synthetic_full.yaml").read_text(encoding="utf-8"))
          mode = os.environ["MODE"]
          merged = dict(cfg)
          mode_cfg = (merged.pop("modes", {}) or {}).get(mode, {}) or {}
          merged.update(mode_cfg)
          grid = merged["grid"]
          seeds = parse_values(os.environ.get("SEEDS_INPUT"), merged.get("seeds", [0]), int)
          posterior_samples = os.environ.get("POSTERIOR_SAMPLES_INPUT").strip() or str(merged.get("posterior_samples", 200))
          n_explain = os.environ.get("N_EXPLAIN_INPUT").strip() or str(merged.get("n_explain", 10))
          matrix = []
          for seed in seeds:
              for n_samples_group in group_samples(grid["n_samples"], mode):
                  if not n_samples_group:
                      continue
                  for n_features in grid["n_features"]:
                      for corr in grid["feature_correlation"]:
                          for balance in grid["class_balance"]:
                              matrix.append(
                                  {
                                      "seed": int(seed),
                                      "n_samples": ",".join(str(v) for v in n_samples_group),
                                      "n_features": str(n_features),
                                      "feature_correlation": str(corr),
                                      "class_balance": str(balance),
                                  }
                              )
          logical = {
              "runner_name": "experiments.run_synthetic_calibration",
              "mode": mode,
              "seeds": seeds,
              "posterior_samples": int(posterior_samples),
              "n_explain": int(n_explain),
              "grid": grid,
              "methods": merged.get("methods", []),
          }
          experiment_config_hash = hashlib.sha256(
              json.dumps(logical, sort_keys=True, separators=(",", ":")).encode("utf-8")
          ).hexdigest()[:12]
          print(f"Prepared {len(matrix)} synthetic matrix job(s).")
          print(f"experiment_config_hash={experiment_config_hash}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"matrix={json.dumps(matrix)}", file=output)
              print(f"experiment_config_hash={experiment_config_hash}", file=output)
          PY

  synthetic-partial:
    name: Synthetic seed ${{ matrix.seed }} n ${{ matrix.n_samples }} p ${{ matrix.n_features }}
    runs-on: ubuntu-latest
    needs: prepare-matrix
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run synthetic partial
        env:
          MODE: ${{ inputs.mode }}
          SEED: ${{ matrix.seed }}
          N_SAMPLES: ${{ matrix.n_samples }}
          N_FEATURES: ${{ matrix.n_features }}
          FEATURE_CORRELATION: ${{ matrix.feature_correlation }}
          CLASS_BALANCE: ${{ matrix.class_balance }}
          POSTERIOR_SAMPLES: ${{ inputs.posterior_samples }}
          N_EXPLAIN: ${{ inputs.n_explain }}
          BAYESIAN_FPDE_EXPERIMENT_CONFIG_HASH: ${{ needs.prepare-matrix.outputs.experiment_config_hash }}
          PYTHONUNBUFFERED: "1"
        run: |
          EXTRA_ARGS=()
          if [ -n "$POSTERIOR_SAMPLES" ]; then EXTRA_ARGS+=(--posterior-samples "$POSTERIOR_SAMPLES"); fi
          if [ -n "$N_EXPLAIN" ]; then EXTRA_ARGS+=(--n-explain "$N_EXPLAIN"); fi
          python -m experiments.run_synthetic_calibration \
            --config configs/synthetic_full.yaml \
            --mode "$MODE" \
            --seed "$SEED" \
            --n-samples "$N_SAMPLES" \
            --n-features "$N_FEATURES" \
            --feature-correlation "$FEATURE_CORRELATION" \
            --class-balance "$CLASS_BALANCE" \
            "${EXTRA_ARGS[@]}"
      - name: Stage partial artifact
        if: always()
        env:
          SEED: ${{ matrix.seed }}
          N_SAMPLES: ${{ matrix.n_samples }}
          N_FEATURES: ${{ matrix.n_features }}
          FEATURE_CORRELATION: ${{ matrix.feature_correlation }}
          CLASS_BALANCE: ${{ matrix.class_balance }}
        run: |
          SAFE_N="${N_SAMPLES//,/p}"
          DEST="ci_artifacts/synthetic_seed_${SEED}_n_${SAFE_N}_p_${N_FEATURES}_${FEATURE_CORRELATION}_${CLASS_BALANCE}"
          mkdir -p "$DEST"
          cp -R results figures logs "$DEST/" || true
      - name: Upload partial synthetic results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: synthetic-calibration-${{ matrix.seed }}-${{ matrix.n_samples }}-${{ matrix.n_features }}-${{ matrix.feature_correlation }}-${{ matrix.class_balance }}
          path: ci_artifacts/
          retention-days: 30

  aggregate:
    name: Aggregate synthetic calibration
    runs-on: ubuntu-latest
    needs:
      - prepare-matrix
      - synthetic-partial
    if: always()

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Download partial artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: synthetic-calibration-*
          path: synthetic_artifacts
          merge-multiple: true
      - name: Combine synthetic outputs
        run: |
          python - <<'PY'
          from experiments.aggregate_results import combine_synthetic_task_outputs

          combine_synthetic_task_outputs("synthetic_artifacts", "results", "figures")
          PY
      - name: Upload synthetic aggregate
        uses: actions/upload-artifact@v7
        with:
          name: synthetic-calibration-aggregate
          path: |
            results/
            figures/
            logs/
          retention-days: 30
