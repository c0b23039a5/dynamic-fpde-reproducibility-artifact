name: fpde-repro
channels:
  - conda-forge
dependencies:
  - python=3.14
  - pip
  - numpy
  - pandas
  - tabulate
  - jinja2
  - pyyaml
  - scikit-learn
  - scipy
  - matplotlib
  - umap-learn
  - seaborn
  - pip:
      - fpde @ git+https://github.com/fpde-xai/fpde.git@67f9e8829ec2bf82d99e239b443392424f80d84e
      - torch
      - torchaudio
      - tqdm
      - lightgbm
      - openml
      - shap
      - lime
      - aime-xai
      - pytest
      - pyarrow
      - soundfile
      # Optional NVIDIA CUDA backend for Dynamic-FPDE tensor batches.
      - cupy-cuda13x
