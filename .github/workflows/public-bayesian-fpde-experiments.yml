name: Public Bayesian-FPDE experiments

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Experiment mode to run"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - pilot
          - full
      install_baselines:
        description: "Install optional SHAP/LIME baseline dependencies"
        required: true
        default: false
        type: boolean
      run_tests:
        description: "Run pytest before experiments"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  prepare-openml-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install matrix dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Build public experiment matrix
        id: matrix
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          config_path = Path("configs/openml_public_4experiments.yaml")
          mode = "${{ inputs.mode }}"
          raw = yaml.safe_load(config_path.read_text()) or {}
          mode_overrides = (raw.get("modes") or {}).get(mode) or {}
          cfg = {k: v for k, v in raw.items() if k != "modes"}
          cfg.update(mode_overrides)

          experiments = [
              {
                  "label": "Public uncertainty validation",
                  "artifact": "public-uncertainty-validation",
                  "module": "experiments.run_public_uncertainty_validation",
              },
              {
                  "label": "Stability",
                  "artifact": "stability",
                  "module": "experiments.run_stability",
              },
              {
                  "label": "Faithfulness",
                  "artifact": "faithfulness",
                  "module": "experiments.run_faithfulness",
              },
              {
                  "label": "Training-size uncertainty",
                  "artifact": "training-size-uncertainty",
                  "module": "experiments.run_training_size_uncertainty",
              },
          ]

          if cfg.get("local_smoke", False):
              tasks = [{"task_id": "", "task_slug": "local-smoke", "task_label": "local smoke"}]
          else:
              task_ids = list(cfg.get("task_ids") or [])
              if not task_ids:
                  raise SystemExit("openml_public_4experiments.yaml must define task_ids for matrix execution")
              max_tasks = int(cfg.get("max_tasks") or 0)
              if max_tasks:
                  task_ids = task_ids[:max_tasks]
              tasks = [
                  {
                      "task_id": str(int(task_id)),
                      "task_slug": f"task-{int(task_id)}",
                      "task_label": f"task {int(task_id)}",
                  }
                  for task_id in task_ids
              ]

          matrix = []
          for experiment in experiments:
              for task in tasks:
                  matrix.append({**experiment, **task, "job_label": f"{experiment['label']} / {task['task_label']}"})

          print(f"Prepared {len(matrix)} public experiment matrix job(s).")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"matrix={json.dumps(matrix, separators=(',', ':'))}", file=output)
          PY

  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Bayesian-FPDE pipeline
        run: |
          python -m pip install --upgrade pip
          if [ "${{ inputs.install_baselines }}" = "true" ]; then
            python -m pip install -e '.[dev,openml,baselines]'
          else
            python -m pip install -e '.[dev,openml]'
          fi

      - name: Run tests
        if: ${{ inputs.run_tests }}
        continue-on-error: true
        run: |
          python -m pytest

  public-experiments:
    needs:
      - prepare-openml-matrix
      - preflight
    name: ${{ matrix.job_label }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-openml-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Bayesian-FPDE pipeline
        run: |
          python -m pip install --upgrade pip
          if [ "${{ inputs.install_baselines }}" = "true" ]; then
            python -m pip install -e '.[dev,openml,baselines]'
          else
            python -m pip install -e '.[dev,openml]'
          fi

      - name: Run public-data experiments
        run: |
          echo "Running ${{ matrix.module }} with mode=${{ inputs.mode }} task_id=${{ matrix.task_id }}"
          task_args=()
          if [ -n "${{ matrix.task_id }}" ]; then
            task_args=(--task-id "${{ matrix.task_id }}")
          fi
          python -m "${{ matrix.module }}" --config configs/openml_public_4experiments.yaml --mode "${{ inputs.mode }}" "${task_args[@]}"

      - name: Upload partial public experiment artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bayesian-fpde-public-${{ inputs.mode }}-${{ matrix.artifact }}-${{ matrix.task_slug }}
          path: |
            results/
            figures/
            logs/
          retention-days: 14

  aggregate:
    needs: public-experiments
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install Bayesian-FPDE pipeline
        run: |
          python -m pip install --upgrade pip
          if [ "${{ inputs.install_baselines }}" = "true" ]; then
            python -m pip install -e '.[dev,openml,baselines]'
          else
            python -m pip install -e '.[dev,openml]'
          fi

      - name: Download partial public experiment artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bayesian-fpde-public-${{ inputs.mode }}-*
          path: partial-artifacts

      - name: Combine partial public experiment results
        run: |
          python - <<'PY'
          from experiments.aggregate_results import combine_public_task_outputs

          combine_public_task_outputs("partial-artifacts", "results", "logs")
          PY

      - name: Aggregate public-data results
        run: |
          python -m experiments.aggregate_results --results-dir results --figures-dir figures

      - name: Upload public experiment artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bayesian-fpde-public-${{ inputs.mode }}
          path: |
            results/
            figures/
            logs/
          retention-days: 14
